<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Route App</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://slwjqcstrrsnpgnyhmps.supabase.co",
      "YOUR_SUPABASE_ANON_KEY"
    );

    window.supabase = supabase;

    const ADMIN_EMAIL = "felix.dober@aon.at";

    let currentUser = null;

    function isAdmin(user) {
      return user.email === ADMIN_EMAIL;
    }

    function show(view) {
      document.getElementById("loginView").style.display = view === "login" ? "block" : "none";
      document.getElementById("appView").style.display = view === "app" ? "block" : "none";
    }

    async function login() {
      const email = emailInput.value;
      const password = passwordInput.value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert(error.message);
        return;
      }

      currentUser = data.user;
      await loadTasks();
      show("app");
    }

    async function logout() {
      await supabase.auth.signOut();
      currentUser = null;
      show("login");
    }

    async function markDone(id) {
      await supabase
        .from("tasks")
        .update({ done: true })
        .eq("id", id);

      loadTasks();
    }

    async function loadTasks() {
      const { data: userData } = await supabase.auth.getUser();
      const user = userData.user;
      currentUser = user;

      if (!user) {
        show("login");
        return;
      }

      let query = supabase.from("tasks").select("*");

      // 👤 User sieht nur eigene
      if (!isAdmin(user)) {
        query = query.eq("user_id", user.id);
      }

      const { data, error } = await query;

      const list = document.getElementById("taskList");
      list.innerHTML = "";

      if (error) {
        list.innerHTML = "<li>Fehler beim Laden</li>";
        return;
      }

      if (!data.length) {
        list.innerHTML = "<li>Keine Aufgaben</li>";
        return;
      }

      let doneCount = 0;

      data.forEach(task => {
        if (task.done) doneCount++;

        const li = document.createElement("li");

        li.innerHTML = `
          <div>
            ${task.task_text}
          </div>

          <div style="margin-top:8px;">
            ${task.done ? "✅ erledigt" : "❌ offen"}
          </div>

          <button onclick="markDone('${task.id}')" ${task.done ? "disabled" : ""}>
            Erledigt
          </button>
        `;

        list.appendChild(li);
      });

      // 👑 Admin Fortschritt
      if (isAdmin(user)) {
        const info = document.getElementById("adminInfo");
        info.innerText = `Fortschritt: ${doneCount} / ${data.length}`;
      }
    }

    window.login = login;
    window.logout = logout;
    window.markDone = markDone;

    window.addEventListener("load", async () => {
      const { data } = await supabase.auth.getUser();

      if (data.user) {
        await loadTasks();
        show("app");
      } else {
        show("login");
      }
    });
  </script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      width: 340px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #1f2937;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .logout {
      background: #ef4444;
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginView" class="card">
    <h2>Login</h2>
    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Passwort">
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="appView" class="card hidden">
    <h2>Deine Routen</h2>

    <div id="adminInfo" style="margin-bottom:10px;"></div>

    <ul id="taskList"></ul>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

</body>
</html>
