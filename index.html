<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Task App Clean</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const supabase = createClient(
      "https://slwjqcstrrsnpgnyhmps.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsd2pxY3N0cnJzbnBnbnlobXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDI0MzYsImV4cCI6MjA5MzU3ODQzNn0.cYRwN0Yp0_m8_qeuYzg0qgSUzClv4O1AU4z4BYyNLG8"
    );

    window.supabase = supabase;

    const ADMIN_EMAIL = "felix.dober@aon.at";

    let currentUser = null;

    // 👑 Admin Check
    function isAdmin(user) {
      return user?.email === ADMIN_EMAIL;
    }

    // 🔁 View Switch
    function show(view) {
      document.getElementById("loginView").style.display = view === "login" ? "block" : "none";
      document.getElementById("appView").style.display = view === "app" ? "block" : "none";
    }

    // 🔐 LOGIN
    async function login() {
      const email = document.getElementById("emailInput").value;
      const password = document.getElementById("passwordInput").value;

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) return alert(error.message);

      currentUser = data.user;

      document.getElementById("adminPanel").style.display =
        isAdmin(currentUser) ? "block" : "none";

      await loadTasks();
      show("app");
    }

    async function logout() {
      await supabase.auth.signOut();
      currentUser = null;
      show("login");
    }

    // ➕ TASK ERSTELLEN (ADMIN)
    async function createTask() {
      const text = document.getElementById("taskText").value;

      if (!text) return alert("Bitte Text eingeben");

      const user = (await supabase.auth.getUser()).data.user;

      const { error } = await supabase.from("tasks").insert({
        task_text: text,
        user_id: user.id,
        done: false
      });

      if (error) {
        console.error(error);
        alert(error.message);
        return;
      }

      document.getElementById("taskText").value = "";
      loadTasks();
    }

    // ✅ ERLEDIGT
    async function markDone(id) {
      const { error } = await supabase
        .from("tasks")
        .update({ done: true })
        .eq("id", id);

      if (error) {
        console.error(error);
        alert(error.message);
        return;
      }

      loadTasks();
    }

    // 📦 TASKS LADEN
    async function loadTasks() {
      const { data: authData } = await supabase.auth.getUser();
      const user = authData.user;

      currentUser = user;

      if (!user) return show("login");

      let query = supabase.from("tasks").select("*");

      // 👇 USER FILTER
      if (!isAdmin(user)) {
        query = query.eq("user_id", user.id);
      }

      const { data, error } = await query;

      const list = document.getElementById("taskList");
      list.innerHTML = "";

      if (error) {
        console.error(error);
        list.innerHTML = "<li>Fehler beim Laden</li>";
        return;
      }

      if (!data || data.length === 0) {
        list.innerHTML = "<li>Keine Aufgaben vorhanden</li>";
        return;
      }

      let doneCount = 0;

      data.forEach(task => {
        if (task.done) doneCount++;

        const li = document.createElement("li");

        li.innerHTML = `
          <div><b>${task.task_text}</b></div>
          <div>${task.done ? "✅ erledigt" : "❌ offen"}</div>
          <button onclick="markDone('${task.id}')" ${task.done ? "disabled" : ""}>
            Erledigt
          </button>
        `;

        list.appendChild(li);
      });

      if (isAdmin(user)) {
        document.getElementById("adminInfo").innerText =
          `Fortschritt: ${doneCount} / ${data.length}`;
      }
    }

    // 🌍 GLOBAL
    window.login = login;
    window.logout = logout;
    window.createTask = createTask;
    window.markDone = markDone;

    // 🚀 START
    window.addEventListener("load", async () => {
      const { data } = await supabase.auth.getUser();

      if (data.user) {
        currentUser = data.user;

        document.getElementById("adminPanel").style.display =
          isAdmin(data.user) ? "block" : "none";

        await loadTasks();
        show("app");
      } else {
        show("login");
      }
    });
  </script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #111827;
      padding: 25px;
      border-radius: 12px;
      width: 360px;
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #1f2937;
      margin: 8px 0;
      padding: 10px;
      border-radius: 8px;
    }

    .logout {
      background: #ef4444;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <!-- LOGIN -->
  <div id="loginView" class="card">
    <h2>Login</h2>
    <input id="emailInput" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Passwort">
    <button onclick="login()">Login</button>
  </div>

  <!-- APP -->
  <div id="appView" class="card" style="display:none;">
    <h2>Tasks</h2>

    <div id="adminInfo"></div>

    <!-- ADMIN -->
    <div id="adminPanel" style="display:none;">
      <h3>Neue Aufgabe</h3>
      <input id="taskText" placeholder="Task">
      <button onclick="createTask()">Erstellen</button>
    </div>

    <ul id="taskList"></ul>

    <button class="logout" onclick="logout()">Logout</button>
  </div>

</body>
</html>
