<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task System Pro - High Performance</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    const SUPABASE_URL = "https://slwjqcstrrsnpgnyhmps.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsd2pxY3N0cnJzbnBnbnlobXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDI0MzYsImV4cCI6MjA5MzU3ODQzNn0.cYRwN0Yp0_m8_qeuYzg0qgSUzClv4O1AU4z4BYyNLG8";
    const ADMIN_EMAIL = "felix.dober@aon.at";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;
    let profilesMap = {}; 
    let currentFilter = "all";
    let realtimeChannel = null; // Speicher für den Live-Kanal

    const isAdmin = (user) => user?.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();

    function showError(message) {
      const errDiv = document.getElementById("errorDisplay");
      errDiv.textContent = `⚠️ ${message}`;
      errDiv.style.display = "block";
      setTimeout(() => errDiv.style.display = "none", 5000);
    }

    async function safeData(promise, context) {
      const { data, error } = await promise;
      if (error) { showError(`${context}: ${error.message}`); return null; }
      return data;
    }

    function showView(viewName) {
      document.getElementById("loginView").style.display = viewName === "login" ? "block" : "none";
      document.getElementById("appView").style.display = viewName === "app" ? "block" : "none";
    }

    function switchTab(tabId, event) {
      document.querySelectorAll(".tab-content").forEach(el => el.style.display = "none");
      document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));
      document.getElementById(tabId).style.display = "block";
      if (event) event.currentTarget.classList.add("active");
    }

    async function loadProfiles() {
      const data = await safeData(supabase.from("profiles").select("*"), "Profile laden");
      if (!data) return;
      const select = document.getElementById("userSelect");
      const filterSelect = document.getElementById("adminUserFilter");
      select.innerHTML = ""; 
      filterSelect.innerHTML = '<option value="all">Alle User anzeigen</option>';
      data.forEach(p => {
        profilesMap[p.id] = p.email; 
        select.appendChild(new Option(p.email, p.id));
        filterSelect.appendChild(new Option(p.email, p.id));
      });
    }

    async function loadTasks() {
      let query = supabase.from("tasks").select("*");
      if (!isAdmin(currentUser)) {
        query = query.eq("user_id", currentUser.id);
      } else if (currentFilter !== "all") {
        query = query.eq("user_id", currentFilter);
      }
      const data = await safeData(query.order('created_at', { ascending: false }), "Tasks laden");
      if (data) renderTasks(data);
    }

    function renderTasks(tasks) {
      const openList = document.getElementById("openTaskList");
      const doneList = document.getElementById("doneTaskList");
      openList.innerHTML = ""; doneList.innerHTML = "";

      tasks.forEach(task => {
        const li = document.createElement("li");
        li.className = `priority-${task.priority?.toLowerCase() || 'mittel'}`;
        const userIsAdmin = isAdmin(currentUser);
        const isOwner = task.user_id === currentUser.id;

        const dateObj = new Date(task.created_at);
        const timeStr = dateObj.toLocaleDateString('de-DE') + " " + dateObj.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});

        let html = `
          <div class="task-meta">
            <span class="prio-tag">${task.priority || 'Mittel'}</span>
            <span class="time-tag">📅 Erstellt: ${timeStr}</span>
            ${task.due_date ? `<span class="due-tag">⌛ Bis: ${new Date(task.due_date).toLocaleDateString('de-DE')}</span>` : ''}
          </div>
        `;

        if (userIsAdmin) {
          html += `<div class="user-badge">👤 An: ${profilesMap[task.user_id] || "User"}</div>`;
        }

        html += `
          <div class="task-header">
            <span class="task-title">${task.task_text}</span>
            ${userIsAdmin ? `<button class="small-btn" onclick="window.editTaskTitle('${task.id}', '${task.task_text}')">✏️</button>` : ''}
          </div>
          <div class="chat-box">
            <div class="msg admin-msg">
              <strong>Chef-Anweisung:</strong>
              <p>${task.admin_notes || "<i>Keine Notiz.</i>"}</p>
              ${userIsAdmin ? `<button class="tiny-btn" onclick="window.editAdminNote('${task.id}', '${task.admin_notes || ""}')">Bearbeiten</button>` : ""}
            </div>
            <div class="msg user-msg">
              <strong>Rückfrage / Feedback:</strong>
              <p>${task.user_feedback || "<i>Noch keine Rückmeldung.</i>"}</p>
              ${isOwner ? `<button class="tiny-btn" onclick="window.editUserFeedback('${task.id}', '${task.user_feedback || ""}')">Antworten</button>` : ""}
            </div>
          </div>
          <div class="btn-group">
        `;
        li.innerHTML = html;

        const btns = li.querySelector(".btn-group");
        if (!task.done) {
          const doneBtn = document.createElement("button");
          doneBtn.textContent = "Erledigt ✅";
          doneBtn.onclick = () => updateStatus(task.id, true);
          btns.append(doneBtn);
          openList.appendChild(li);
        } else {
          if (userIsAdmin) {
            const undoBtn = document.createElement("button");
            undoBtn.textContent = "↩ Öffnen";
            undoBtn.className = "undo-btn";
            undoBtn.onclick = () => updateStatus(task.id, false);
            btns.append(undoBtn);
          }
          const delBtn = document.createElement("button");
          delBtn.textContent = "Löschen 🗑️";
          delBtn.className = "delete-btn";
          delBtn.onclick = () => deleteTask(task.id);
          btns.append(delBtn);
          doneList.appendChild(li);
        }
      });
    }

    // --- GLOBALE AKTIONEN ---
    window.editTaskTitle = async (id, old) => {
      const t = prompt("Text ändern:", old);
      if (t) { await safeData(supabase.from("tasks").update({ task_text: t }).eq("id", id), "Titel"); loadTasks(); }
    };
    window.editAdminNote = async (id, cur) => {
      const n = prompt("Anweisung:", cur);
      if (n !== null) { await safeData(supabase.from("tasks").update({ admin_notes: n }).eq("id", id), "Notiz"); loadTasks(); }
    };
    window.editUserFeedback = async (id, cur) => {
      const f = prompt("Deine Rückfrage:", cur);
      if (f !== null) { await safeData(supabase.from("tasks").update({ user_feedback: f }).eq("id", id), "Feedback"); loadTasks(); }
    };

    async function updateStatus(id, done) {
      await safeData(supabase.from("tasks").update({ done }).eq("id", id), "Status");
      loadTasks();
    }

    async function deleteTask(id) {
      if (confirm("Löschen?")) { await safeData(supabase.from("tasks").delete().eq("id", id), "Löschen"); loadTasks(); }
    }

    // Funktion für Echtzeit-Updates (Realtime)
    function setupRealtime() {
      // Falls bereits ein Kanal offen ist, vorher schließen (wichtig bei Logout/Login Wechseln)
      if (realtimeChannel) {
        supabase.removeChannel(realtimeChannel);
      }

      realtimeChannel = supabase
        .channel('tasks-live-changes')
        .on(
          'postgres_changes', 
          { 
            event: '*', 
            schema: 'public', 
            table: 'tasks' 
          }, 
          (payload) => {
            console.log("Live-Update empfangen:", payload);
            loadTasks(); // Aktualisiert die Task-Liste sofort für alle User
          }
        )
        .subscribe();
    }

    async function initApp() {
      const userAdmin = isAdmin(currentUser);
      document.getElementById("adminTabBtn").style.display = userAdmin ? "inline-block" : "none";
      document.getElementById("filterSection").style.display = userAdmin ? "block" : "none";
      await loadProfiles();
      await loadTasks();
      
      // Realtime aktivieren, sobald die App initialisiert ist
      setupRealtime();

      showView("app");
      switchTab("openView", { currentTarget: document.getElementById("defaultTab") });
    }

    window.addEventListener("load", async () => {
      document.getElementById("loginBtn").onclick = async () => {
        const e = document.getElementById("emailInput").value, p = document.getElementById("passwordInput").value;
        const data = await safeData(supabase.auth.signInWithPassword({ email: e, password: p }), "Login");
        if (data) { currentUser = data.user; await initApp(); }
      };
      document.getElementById("logoutBtn").onclick = () => { 
        if (realtimeChannel) supabase.removeChannel(realtimeChannel); // Live-Verbindung trennen
        supabase.auth.signOut(); 
        showView("login"); 
      };
      
      document.getElementById("createTaskBtn").onclick = async () => {
        const text = document.getElementById("taskText").value;
        const uId = document.getElementById("userSelect").value;
        const prio = document.getElementById("prioSelect").value || "Mittel"; // Standard-Priorität absichern
        const due = document.getElementById("dueInput").value;
        
        if (!text) return alert("Text fehlt!");
        
        // Ablaufdatum validieren: Wenn leer, wird explizit "null" übermittelt
        const formattedDueDate = due && due.trim() !== "" ? due : null;

        await safeData(supabase.from("tasks").insert({ 
          task_text: text, 
          user_id: uId, 
          done: false, 
          admin_notes: "", 
          user_feedback: "", 
          priority: prio, 
          due_date: formattedDueDate
        }), "Erstellen");
        
        document.getElementById("taskText").value = "";
        document.getElementById("dueInput").value = ""; // Datumsfeld nach Erstellung leeren
        loadTasks();
      };

      document.getElementById("adminUserFilter").onchange = (e) => { currentFilter = e.target.value; loadTasks(); };
      document.getElementById("adminTabBtn").onclick = (e) => switchTab("adminView", e);
      document.getElementById("defaultTab").onclick = (e) => switchTab("openView", e);
      document.getElementById("doneTabBtn").onclick = (e) => switchTab("doneView", e);

      const { data } = await supabase.auth.getUser();
      if (data?.user) { currentUser = data.user; await initApp(); }
    });
  </script>

  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; margin: 0; }
    .card { background: #111827; padding: 20px; border-radius: 16px; width: 100%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    #errorDisplay { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 8px; margin-bottom: 15px; display: none; font-size: 0.8em; }

    .menu { display: flex; background: #1f2937; border-radius: 12px; padding: 5px; margin-bottom: 15px; }
    .tab-btn { background: transparent; border: none; color: #9ca3af; padding: 10px; cursor: pointer; flex: 1; border-radius: 8px; font-weight: bold; font-size: 0.8em; }
    .tab-btn.active { background: #3b82f6; color: white; }

    input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #374151; background: #1f2937; color: white; box-sizing: border-box; }
    button { background: #3b82f6; border: none; cursor: pointer; font-weight: bold; }
    
    ul { list-style: none; padding: 0; }
    li { background: #1f2937; margin-bottom: 15px; padding: 15px; border-radius: 12px; border-left: 5px solid #3b82f6; transition: 0.3s; }
    
    li.priority-hoch { border-left-color: #ef4444; }
    li.priority-mittel { border-left-color: #f59e0b; }
    li.priority-niedrig { border-left-color: #10b981; }

    .task-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
    .prio-tag, .time-tag, .due-tag { font-size: 0.65em; padding: 2px 6px; border-radius: 4px; background: #374151; color: #d1d5db; font-weight: bold; }
    .priority-hoch .prio-tag { background: #ef4444; color: white; }

    .task-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .task-title { font-weight: bold; font-size: 1.1em; flex: 1; }
    .small-btn { width: auto; padding: 4px 8px; margin: 0; font-size: 0.7em; background: #4b5563; }

    .chat-box { display: flex; flex-direction: column; gap: 8px; margin: 15px 0; }
    .msg { padding: 10px; border-radius: 8px; font-size: 0.85em; }
    .admin-msg { background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59,130,246,0.2); }
    .user-msg { background: rgba(16, 185, 129, 0.08); border: 1px solid rgba(16,185,129,0.2); margin-left: 10px; }
    .msg strong { display: block; font-size: 0.7em; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px; }
    .msg p { margin: 0; line-height: 1.4; }

    .tiny-btn { background: transparent; border: 1px solid #4b5563; color: #9ca3af; padding: 2px 8px; font-size: 0.7em; width: auto; margin-top: 8px; }
    .user-badge { font-size: 0.75em; color: #3b82f6; margin-bottom: 8px; font-weight: bold; }
    .logout { background: transparent; border: 1px solid #ef4444; color: #ef4444; font-size: 0.8em; margin-top: 20px; }
  </style>
</head>
<body>

  <div class="card">
    <div id="errorDisplay"></div>

    <div id="loginView">
      <h2>Task Manager</h2>
      <input id="emailInput" type="email" placeholder="E-Mail">
      <input id="passwordInput" type="password" placeholder="Passwort">
      <button id="loginBtn">Einloggen</button>
    </div>

    <div id="appView" style="display:none;">
      <div class="menu">
        <button class="tab-btn" id="adminTabBtn">➕ Neu</button>
        <button class="tab-btn" id="defaultTab">⏳ Offen</button>
        <button class="tab-btn" id="doneTabBtn">✅ Erledigt</button>
      </div>

      <div id="filterSection" style="display:none;">
        <select id="adminUserFilter"></select>
      </div>

      <div id="adminView" class="tab-content" style="display:none;">
        <h3>Neue Aufgabe</h3>
        <input id="taskText" placeholder="Was ist zu tun?">
        <div style="display:flex; gap:10px;">
          <select id="prioSelect">
            <option value="Niedrig">Niedrig</option>
            <option value="Mittel" selected>Mittel</option>
            <option value="Hoch">Hoch</option>
          </select>
          <input type="date" id="dueInput" style="margin-top:10px;">
        </div>
        <select id="userSelect"></select>
        <button id="createTaskBtn">Zuweisen</button>
      </div>

      <div id="openView" class="tab-content">
        <ul id="openTaskList"></ul>
      </div>

      <div id="doneView" class="tab-content" style="display:none;">
        <ul id="doneTaskList"></ul>
      </div>

      <button id="logoutBtn" class="logout">Abmelden</button>
    </div>
  </div>

</body>
</html>
