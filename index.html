<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task System - Professional Edition</title>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    // --- KONFIGURATION ---
    const SUPABASE_URL = "https://slwjqcstrrsnpgnyhmps.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsd2pxY3N0cnJzbnBnbnlobXBzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDI0MzYsImV4cCI6MjA5MzU3ODQzNn0.cYRwN0Yp0_m8_qeuYzg0qgSUzClv4O1AU4z4BYyNLG8";
    const ADMIN_EMAIL = "felix.dober@aon.at";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
    let currentUser = null;

    // --- HELPER FUNKTIONEN ---
    const isAdmin = (user) => user?.email === ADMIN_EMAIL;

    function showView(viewName) {
      // Alle Views verstecken
      document.getElementById("loginView").style.display = "none";
      document.getElementById("appView").style.display = "none";
      
      if (viewName === "login") {
        document.getElementById("loginView").style.display = "block";
      } else {
        document.getElementById("appView").style.display = "block";
      }
    }

    function switchTab(tabId) {
      // Alle Tab-Inhalte verstecken
      document.querySelectorAll(".tab-content").forEach(el => el.style.display = "none");
      // Alle Tab-Buttons deaktivieren
      document.querySelectorAll(".tab-btn").forEach(el => el.classList.remove("active"));

      // Gewählten Tab zeigen
      document.getElementById(tabId).style.display = "block";
      // Button als aktiv markieren
      event.currentTarget.classList.add("active");
    }

    // --- AUTH LOGIK ---
    async function handleLogin() {
      const email = document.getElementById("emailInput").value;
      const password = document.getElementById("passwordInput").value;
      const { data, error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return alert("Login fehlgeschlagen: " + error.message);
      currentUser = data.user;
      initApp();
    }

    async function handleLogout() {
      await supabase.auth.signOut();
      currentUser = null;
      showView("login");
    }

    // --- DATEN LADEN ---
    async function loadProfiles() {
      const { data, error } = await supabase.from("profiles").select("*");
      if (error) return;
      const select = document.getElementById("userSelect");
      select.innerHTML = ""; 
      data.forEach(p => {
        const option = document.createElement("option");
        option.value = p.id;
        option.textContent = p.email;
        select.appendChild(option);
      });
    }

    async function loadTasks() {
      let query = supabase.from("tasks").select("*");
      if (!isAdmin(currentUser)) {
        query = query.eq("user_id", currentUser.id);
      }

      const { data, error } = await query;
      const openList = document.getElementById("openTaskList");
      const doneList = document.getElementById("doneTaskList");
      
      openList.innerHTML = "";
      doneList.innerHTML = "";

      if (error || !data) return;

      let doneCount = 0;

      data.forEach(task => {
        const li = document.createElement("li");
        const title = document.createElement("div");
        title.style.fontWeight = "bold";
        title.textContent = task.task_text;

        const btnContainer = document.createElement("div");
        btnContainer.style.marginTop = "10px";

        if (!task.done) {
          // Offene Task Liste
          const doneBtn = document.createElement("button");
          doneBtn.textContent = "Als erledigt markieren";
          doneBtn.addEventListener("click", () => markDone(task.id));
          btnContainer.append(doneBtn);
          li.append(title, btnContainer);
          openList.appendChild(li);
        } else {
          // Erledigte Task Liste
          doneCount++;
          const deleteBtn = document.createElement("button");
          deleteBtn.textContent = "Löschen";
          deleteBtn.className = "delete-btn";
          deleteBtn.addEventListener("click", () => deleteTask(task.id));
          btnContainer.append(deleteBtn);
          li.append(title, btnContainer);
          doneList.appendChild(li);
        }
      });

      if (isAdmin(currentUser)) {
        document.getElementById("adminInfo").textContent = `Fortschritt: ${doneCount} / ${data.length} erledigt`;
      }
    }

    // --- AKTIONEN ---
    async function createTask() {
      const text = document.getElementById("taskText").value;
      const userId = document.getElementById("userSelect").value;
      if (!text || !userId) return alert("Bitte alles ausfüllen");
      const { error } = await supabase.from("tasks").insert({ task_text: text, user_id: userId, done: false });
      if (error) return alert(error.message);
      document.getElementById("taskText").value = "";
      loadTasks();
      alert("Task erfolgreich zugewiesen!");
    }

    async function markDone(id) {
      await supabase.from("tasks").update({ done: true }).eq("id", id);
      loadTasks();
    }

    async function deleteTask(id) {
      if (confirm("Aufgabe wirklich löschen?")) {
        await supabase.from("tasks").delete().eq("id", id);
        loadTasks();
      }
    }

    // --- INITIALISIERUNG ---
    async function initApp() {
      const isUserAdmin = isAdmin(currentUser);
      document.getElementById("adminTabBtn").style.display = isUserAdmin ? "inline-block" : "none";
      if (isUserAdmin) await loadProfiles();
      await loadTasks();
      showView("app");
      // Standardmäßig auf "Offen" Tab springen
      document.getElementById("defaultTab").click();
    }

    window.addEventListener("load", async () => {
      document.getElementById("loginBtn").addEventListener("click", handleLogin);
      document.getElementById("logoutBtn").addEventListener("click", handleLogout);
      document.getElementById("createTaskBtn").addEventListener("click", createTask);
      
      // Tab-Navigation
      document.getElementById("adminTabBtn").addEventListener("click", (e) => switchTab("adminView"));
      document.getElementById("defaultTab").addEventListener("click", (e) => switchTab("openView"));
      document.getElementById("doneTabBtn").addEventListener("click", (e) => switchTab("doneView"));

      const { data } = await supabase.auth.getUser();
      if (data.user) {
        currentUser = data.user;
        initApp();
      } else {
        showView("login");
      }
    });
  </script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: #111827;
      padding: 20px;
      border-radius: 16px;
      width: 100%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    /* Menü Styling */
    .menu {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
      background: #1f2937;
      border-radius: 12px;
      padding: 5px;
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: #9ca3af;
      padding: 10px;
      cursor: pointer;
      font-size: 0.9em;
      font-weight: bold;
      flex: 1;
      border-radius: 8px;
      transition: 0.2s;
      margin: 0;
    }

    .tab-btn.active {
      background: #3b82f6;
      color: white;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #374151;
      background: #1f2937;
      color: white;
      box-sizing: border-box;
    }

    button { background: #3b82f6; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #2563eb; }

    .delete-btn { background: #991b1b; }
    .delete-btn:hover { background: #b91c1c; }

    ul { list-style: none; padding: 0; text-align: left; }
    li {
      background: #1f2937;
      margin-bottom: 10px;
      padding: 15px;
      border-radius: 10px;
      border-left: 4px solid #3b82f6;
    }

    .logout { background: #374151; margin-top: 20px; font-size: 0.8em; }
    #adminInfo { font-size: 0.85em; color: #3b82f6; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="loginView" class="card">
    <h2>Task Login</h2>
    <input id="emailInput" type="email" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Passwort">
    <button id="loginBtn">Einloggen</button>
  </div>

  <div id="appView" class="card" style="display:none;">
    <div id="adminInfo"></div>

    <div class="menu">
      <button class="tab-btn" id="adminTabBtn">Zuweisen</button>
      <button class="tab-btn" id="defaultTab">Offen</button>
      <button class="tab-btn" id="doneTabBtn">Erledigt</button>
    </div>

    <div id="adminView" class="tab-content">
      <h3>Aufgabe zuweisen</h3>
      <input id="taskText" placeholder="Was ist zu tun?">
      <select id="userSelect"></select>
      <button id="createTaskBtn">Task erstellen</button>
    </div>

    <div id="openView" class="tab-content">
      <h3>Zu erledigen</h3>
      <ul id="openTaskList"></ul>
    </div>

    <div id="doneView" class="tab-content">
      <h3>Erledigte Aufgaben</h3>
      <ul id="doneTaskList"></ul>
    </div>

    <button id="logoutBtn" class="logout">Abmelden</button>
  </div>

</body>
</html>
